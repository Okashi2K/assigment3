apiVersion: apps/v1
kind: Deployment
metadata:
  name: website-green
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mijn-website
      version: green
  template:
    metadata:
      labels:
        app: mijn-website
        version: green
    spec:
      containers:
      - name: webserver
        # De exacte image link vullen we straks automatisch in via de GitHub Actions pipeline!
        image: IMAGE_PLACEHOLDER 
        ports:
        - containerPort: 80