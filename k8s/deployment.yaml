apiVersion: apps/v1
kind: Deployment
metadata:
  name: website-blue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mijn-website
      version: blue
  template:
    metadata:
      labels:
        app: mijn-website
        version: blue
    spec:
      containers:
      - name: webserver
        image: IMAGE_PLACEHOLDER 
        ports:
        - containerPort: 80